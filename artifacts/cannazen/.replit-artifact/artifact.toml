kind = "web"
previewPath = "/"
title = "CannaZen — E-commerce CBD"
version = "1.0.0"
id = "artifacts/cannazen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21337

[services.development]
run = "pnpm --filter @workspace/cannazen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cannazen", "run", "build" ]
publicDir = "artifacts/cannazen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21337"
BASE_PATH = "/"
