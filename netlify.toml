[build]
  command   = "pnpm --filter @workspace/cannazen run build"
  publish   = "artifacts/cannazen/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NODE_ENV     = "production"
  BASE_PATH    = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
