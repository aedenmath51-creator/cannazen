services:
  - type: web
    name: cannazen-api
    env: node
    plan: free
    buildCommand: "pnpm install && pnpm --filter @workspace/api-server run build"
    startCommand: "pnpm --filter @workspace/api-server run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: cannazen-db
          property: connectionString
      - key: MOLLIE_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SENDCLOUD_PUBLIC_KEY
        sync: false
      - key: SENDCLOUD_SECRET_KEY
        sync: false
      - key: SENDCLOUD_WEBHOOK_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false

  - type: static
    name: cannazen-web
    buildCommand: "pnpm install && pnpm --filter @workspace/cannazen run build"
    staticPublishPath: "artifacts/cannazen/dist/public"
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: "/"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cannazen-db
    plan: free
